<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顎祭 FINAL — 相性診断</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+JP:wght@400;700;900&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#cc2222;--red2:#ff3333;--white:#f5f0e8;--gray:#9a9a9a;--dark:#080808;--dark2:#111111;--dark3:#1a1a1a;--border:#2a2a2a;}
body{background:var(--dark);color:var(--white);font-family:'Zen Kaku Gothic New',sans-serif;min-height:100vh;overflow-x:hidden;}
.spotlight-bg{position:fixed;top:0;left:0;right:0;height:100vh;pointer-events:none;z-index:0;overflow:hidden;}
.sp-canvas{position:absolute;top:0;left:0;width:100%;height:100%;transition:opacity 0.5s;}
.screen{display:none;position:relative;z-index:1;min-height:100vh;padding:3rem 1.5rem 2rem;max-width:480px;margin:0 auto;flex-direction:column;}
.screen.active{display:flex;}
#screen-top{justify-content:space-between;align-items:center;text-align:center;padding-top:4rem;padding-bottom:3rem;}
.top-logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(4.5rem,18vw,7rem);letter-spacing:0.02em;line-height:1;color:var(--white);}
.top-logo span{color:var(--red);}
.top-event{font-family:'Noto Serif JP',serif;font-size:clamp(1.4rem,6vw,2.2rem);font-weight:700;letter-spacing:0.2em;color:var(--gray);margin-top:0.5rem;}
.top-divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border),var(--red),var(--border),transparent);margin:2rem 0;}
.top-catch{font-family:'Noto Serif JP',serif;font-size:clamp(1.0rem,3.5vw,1.3rem);font-weight:900;line-height:1.6;color:var(--white);}
.top-catch em{color:var(--red);font-style:normal;}
.top-subcopy{font-size:0.72rem;color:var(--gray);letter-spacing:0.1em;line-height:2;margin-bottom:0.8rem;}
.top-subcopy em{color:var(--red);font-style:normal;letter-spacing:0.2em;}
.top-skull{margin:1.5rem auto;text-align:center;animation:pulse 4s ease-in-out infinite;}



@keyframes pulse{0%,100%{opacity:0.7;transform:scale(1);}50%{opacity:1;transform:scale(1.06);}}
.top-desc{font-size:0.8rem;color:var(--gray);line-height:2;letter-spacing:0.05em;}
.btn-start{margin-top:2rem;background:var(--red);color:var(--white);border:none;border-left:3px solid var(--red2);padding:1.1rem 1.5rem;width:100%;max-width:300px;font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:0.15em;cursor:pointer;transition:all 0.2s;}
.btn-start:hover{background:var(--red2);transform:translateY(-2px);}
.top-date{margin-top:1.5rem;font-size:0.7rem;color:var(--gray);letter-spacing:0.2em;}
#screen-quiz{justify-content:space-between;gap:1.5rem;padding-top:2.5rem;}
.quiz-top{display:flex;flex-direction:column;gap:1.2rem;}
.progress-row{display:flex;align-items:center;gap:1rem;}
.progress-num{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--red);letter-spacing:0.1em;min-width:60px;}
.progress-bar{flex:1;height:2px;background:var(--border);}
.progress-fill{height:100%;background:var(--red);transition:width 0.4s ease;}
.q-category{display:none;}
.q-text{font-family:'Noto Serif JP',serif;font-size:clamp(1.2rem,4.5vw,1.5rem);font-weight:700;line-height:1.6;color:var(--white);padding-bottom:0.5rem;border-bottom:1px solid var(--border);}
.choices{display:flex;flex-direction:column;gap:0.8rem;flex:1;justify-content:center;}
.choice-btn{background:var(--dark2);border:1px solid var(--border);color:var(--white);padding:1.3rem 1.2rem;font-family:'Zen Kaku Gothic New',sans-serif;font-size:0.95rem;text-align:left;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;gap:1rem;line-height:1.5;clip-path:polygon(0 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%);position:relative;}
.choice-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red);opacity:0;transition:opacity 0.2s;}
.choice-btn:hover{border-color:var(--red);background:var(--dark3);}
.choice-btn:hover::before,.choice-btn.selected::before{opacity:1;}
.choice-btn.selected{border-color:var(--red);background:var(--dark3);}
.choice-key{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--red);min-width:22px;}
.btn-back{background:transparent;border:none;color:var(--gray);font-family:'Zen Kaku Gothic New',sans-serif;font-size:0.78rem;letter-spacing:0.15em;cursor:pointer;display:flex;align-items:center;gap:0.4rem;padding:0.5rem 0;transition:color 0.2s;}
.btn-back:hover{color:var(--white);}
#screen-result{gap:1.5rem;padding-top:2.5rem;align-items:stretch;}
.result-eyebrow{font-family:'Bebas Neue',sans-serif;font-size:0.8rem;letter-spacing:0.4em;color:var(--red);text-align:center;}
.result-headline{font-family:'Noto Serif JP',serif;font-size:clamp(1.2rem,4vw,1.5rem);font-weight:900;text-align:center;line-height:1.5;color:var(--white);}
.card-top{border:1px solid var(--red);background:var(--dark2);padding:1.8rem 1.5rem;position:relative;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));}
.card-top::before{content:'BEST MATCH';position:absolute;top:-1px;left:1.2rem;font-family:'Bebas Neue',sans-serif;font-size:0.65rem;letter-spacing:0.3em;color:var(--dark);background:var(--red);padding:0.1rem 0.6rem;}
.card-member-name{font-family:'Noto Serif JP',serif;font-size:clamp(2rem,8vw,3rem);font-weight:900;color:var(--white);letter-spacing:0.08em;line-height:1.2;margin-top:0.8rem;margin-bottom:1rem;}
.score-row{display:flex;align-items:baseline;gap:0.3rem;margin-bottom:0.6rem;}
.score-big{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;color:var(--red);line-height:1;}
.score-unit{font-size:1.2rem;color:var(--gray);}
.score-track{width:100%;height:3px;background:var(--border);margin-bottom:1rem;}
.score-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--red2));transition:width 1.2s cubic-bezier(0.22,1,0.36,1);width:0%;}
.card-comment{font-size:0.8rem;color:var(--gray);line-height:1.9;border-top:1px solid var(--border);padding-top:1rem;}
.ranking-wrap{display:flex;flex-direction:column;gap:0.5rem;}
.ranking-label{font-family:'Bebas Neue',sans-serif;font-size:0.75rem;letter-spacing:0.3em;color:var(--gray);margin-bottom:0.3rem;}
.rank-item{display:flex;align-items:center;gap:0.8rem;padding:0.75rem 1rem;background:var(--dark2);border:1px solid var(--border);border-left:2px solid var(--border);transition:border-color 0.2s;}
.rank-item.r1{border-left-color:var(--red);}
.rank-item.r2{border-left-color:#888;}
.rank-item.r3{border-left-color:#664422;}
.rank-num{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--gray);min-width:18px;text-align:center;}
.rank-item.r1 .rank-num{color:var(--red);}
.rank-name{font-size:0.9rem;font-weight:700;flex:1;}
.rank-bar{width:50px;height:2px;background:var(--border);}
.rank-bar-fill{height:100%;background:var(--red);opacity:0.7;}
.rank-score{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--red);min-width:44px;text-align:right;}
.btn-retry{background:transparent;border:1px solid var(--border);color:var(--gray);padding:0.9rem;font-family:'Zen Kaku Gothic New',sans-serif;font-size:0.8rem;letter-spacing:0.15em;cursor:pointer;transition:all 0.2s;width:100%;}
.btn-retry:hover{border-color:var(--red);color:var(--white);}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fu{animation:fadeUp 0.4s ease forwards;opacity:0;}
</style>
</head>

<div class="spotlight-bg">
<canvas class="sp-canvas" id="sp-canvas"></canvas>
</div>
<script>
(function(){
  const c = document.getElementById('sp-canvas');

  function drawLight(ctx, ox, oy, angle, spreadAngle, length, alpha) {
    const left  = angle - spreadAngle / 2;
    const right = angle + spreadAngle / 2;
    const x1 = ox + Math.sin(left)  * length;
    const y1 = oy + Math.cos(left)  * length;
    const x2 = ox + Math.sin(right) * length;
    const y2 = oy + Math.cos(right) * length;
    const cx = ox + Math.sin(angle) * length;
    const cy = oy + Math.cos(angle) * length;

    // 外側のフワッとした光（広め・薄め）
    const outerGrad = ctx.createRadialGradient(ox, oy, 0, cx, cy, length * 0.9);
    outerGrad.addColorStop(0,   `rgba(255,180,20,${alpha * 0.55})`);
    outerGrad.addColorStop(0.25,`rgba(220,140,10,${alpha * 0.25})`);
    outerGrad.addColorStop(0.6, `rgba(180,100,0,${alpha * 0.08})`);
    outerGrad.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.moveTo(ox, oy);
    ctx.lineTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.closePath();
    ctx.fillStyle = outerGrad;
    ctx.fill();

    // 内側の光の芯（細め・明るめ）
    const innerLeft  = angle - spreadAngle * 0.18;
    const innerRight = angle + spreadAngle * 0.18;
    const ix1 = ox + Math.sin(innerLeft)  * length;
    const iy1 = oy + Math.cos(innerLeft)  * length;
    const ix2 = ox + Math.sin(innerRight) * length;
    const iy2 = oy + Math.cos(innerRight) * length;
    const coreGrad = ctx.createRadialGradient(ox, oy, 0, cx, cy, length * 0.85);
    coreGrad.addColorStop(0,   `rgba(255,230,120,${alpha * 1.0})`);
    coreGrad.addColorStop(0.2, `rgba(255,200,60,${alpha * 0.6})`);
    coreGrad.addColorStop(0.5, `rgba(200,140,10,${alpha * 0.2})`);
    coreGrad.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.moveTo(ox, oy);
    ctx.lineTo(ix1, iy1);
    ctx.lineTo(ix2, iy2);
    ctx.closePath();
    ctx.fillStyle = coreGrad;
    ctx.fill();

    // 光源のグロウ（上部の丸い光）
    const glowR = 28;
    const glowGrad = ctx.createRadialGradient(ox, oy + 8, 0, ox, oy + 8, glowR * 2.5);
    glowGrad.addColorStop(0,   `rgba(255,240,160,${alpha * 1.2})`);
    glowGrad.addColorStop(0.2, `rgba(255,200,60,${alpha * 0.8})`);
    glowGrad.addColorStop(0.5, `rgba(200,130,0,${alpha * 0.3})`);
    glowGrad.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(ox, oy + 8, glowR * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = glowGrad;
    ctx.fill();

    // 光源のハイライト（中心の白い点）
    const hlGrad = ctx.createRadialGradient(ox, oy + 6, 0, ox, oy + 6, glowR * 0.7);
    hlGrad.addColorStop(0,   `rgba(255,255,220,${alpha * 1.4})`);
    hlGrad.addColorStop(0.4, `rgba(255,230,100,${alpha * 0.6})`);
    hlGrad.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(ox, oy + 6, glowR * 0.7, 0, Math.PI * 2);
    ctx.fillStyle = hlGrad;
    ctx.fill();
  }

  function draw() {
    c.width  = window.innerWidth;
    c.height = window.innerHeight;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, c.width, c.height);

    const W = c.width;
    const H = c.height;
    const len = H * 2.8;

    // 5本のライト（フライヤーに近い配置）
    const lights = [
      { x: W * 0.08, angle: -0.30, spread: 0.32, alpha: 0.55 },
      { x: W * 0.28, angle: -0.13, spread: 0.28, alpha: 0.65 },
      { x: W * 0.50, angle:  0.00, spread: 0.30, alpha: 0.70 },
      { x: W * 0.72, angle:  0.13, spread: 0.28, alpha: 0.65 },
      { x: W * 0.92, angle:  0.30, spread: 0.32, alpha: 0.55 },
    ];

    ctx.globalCompositeOperation = 'screen';
    lights.forEach(l => drawLight(ctx, l.x, -10, l.angle, l.spread, len, l.alpha));
    ctx.globalCompositeOperation = 'source-over';
  }

  draw();
  window.addEventListener('resize', draw);
})();
</script>

function goBack(){

function renderQ(){
  const q=questions[cq],tot=questions.length;
  document.getElementById('progress-fill').style.width=(cq/tot*100)+'%';
  document.getElementById('progress-num').textContent='Q'+String(cq+1).padStart(2,'0')+' / '+tot;

  document.getElementById('q-text').textContent=q.text;
  const el=document.getElementById('choices');
  el.innerHTML='';
  ['a','b'].forEach((v,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn fu';
    btn.style.animationDelay=(i*0.1)+'s';
    btn.innerHTML=`<span class="choice-key">${v.toUpperCase()}</span>${q[v]}`;
    btn.onclick=()=>{
      document.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      ua[cq]=v;
      // 回答時に対応する音声を再生
      const qAudio = document.getElementById('q-audio-'+(cq+1));
      if(qAudio){ qAudio.currentTime=0; qAudio.play().catch(()=>{}); }
      const isLast = (cq === questions.length - 1);
      if(isLast){
        // 最後の問題はフェードアウト後に結果へ
        setTimeout(()=>{
          cq++;
          // 画面を1秒かけてフェードアウト
          const screen = document.getElementById('screen-quiz');
          screen.style.transition = 'opacity 1s';
          screen.style.opacity = '0';
          setTimeout(()=>{
            screen.style.transition = '';
            screen.style.opacity = '1';
            showResult();
          }, 1000);
        }, 280);
      } else {
        setTimeout(()=>{cq++;renderQ();},280);
      }
    };
    el.appendChild(btn);
  });
}

function showResult(){
  showScreen('screen-result');
  const resultAudio = document.getElementById('result-audio');
  if(resultAudio){ resultAudio.currentTime=0; resultAudio.play().catch(()=>{}); }
  const Q = questions.length;

  // 各質問で各選択肢を選んだメンバー数を集計
  const rarity = questions.map((_,i) =>
    ({a: members.filter(m=>m.answers[i]==='a').length,
      b: members.filter(m=>m.answers[i]==='b').length})
  );

  // レアボーナス：9人中の少数派を選ぶほど加点
  function rarityBonus(count){
    if(count<=1) return 0.08;  // 1人だけ → 大ボーナス
    if(count<=2) return 0.05;  // 2人     → 中ボーナス
    if(count<=3) return 0.02;  // 3人     → 小ボーナス
    return 0;                   // 4人以上 → ボーナスなし
  }

  // 固定タイブレーカー（レアボーナスでも同率の場合の最終解消）
  const tieBreakers=[0.009,0.008,0.007,0.006,0.005,0.004,0.003,0.002,0.001];

  const ranked = members.map((m, idx) => {
    let score = 0;
    let bonus = 0;
    ua.forEach((a, i) => {
      if(a === m.answers[i]){
        score += 1;
        bonus += rarityBonus(rarity[i][a]);
      }
    });
    const pct = Math.round(score / Q * 100);
    return {name: m.name, score: pct, raw: score + bonus + tieBreakers[idx], comment: m.comment};
  }).sort((a,b) => b.raw - a.raw);
  const top=ranked[0];
  document.getElementById('result-name').textContent=top.name;
  document.getElementById('result-comment').textContent=top.comment;
  setTimeout(()=>{
    document.getElementById('score-fill').style.width=top.score+'%';
    const el=document.getElementById('score-big');
    const s=performance.now();
    const tick=n=>{const t=Math.min((n-s)/1000,1);el.textContent=Math.round(t*top.score);if(t<1)requestAnimationFrame(tick);};
    requestAnimationFrame(tick);
  },400);
  const listEl=document.getElementById('ranking-list');
  listEl.innerHTML='';
  ranked.forEach((m,i)=>{
    const d=document.createElement('div');
    d.className=`rank-item r${i+1} fu`;
    d.style.animationDelay=(0.4+i*0.07)+'s';
    d.innerHTML=`<span class="rank-num">${i+1}</span><span class="rank-name">${m.name}</span><div class="rank-bar"><div class="rank-bar-fill" style="width:${m.score}%"></div></div><span class="rank-score">${m.score}%</span>`;
    listEl.appendChild(d);
  });
}
